<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Classificação das Cores</title>
</head>
<body>

    <h1>Classificação das cores</h1>

    <ul>
        <li>
            <h2>Cores primárias</h2>
            <ol>
                <li>Vermelho</li>
                <li>Azul</li>
                <li>Amarelo</li>
            </ol>
        </li>

        <li>
            <h2>Cores secundárias</h2>
            <ol>
                <li>Verde</li>
                <li>Laranja</li>
                <li>Roxo</li>
            </ol>
        </li>

        <li>
            <h2>Cores terciárias</h2>
            <ol>
                <li>Laranja</li>
                <li>Oliva</li>
                <li>Turquesa</li>
                <li>Celeste</li>
                <li>Violeta</li>
                <li>Rosa</li>
            </ol>
        </li>
    </ul>

</body>
</html>
