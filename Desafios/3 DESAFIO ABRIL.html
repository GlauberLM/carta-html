<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lançamento de Notas</title>
</head>
<body>

    <h1>Lançamento de Notas</h1>

    <form>

        <label for="disciplina">Selecione a disciplina:</label><br>
        <select id="disciplina" name="disciplina">
            <option>Introdução à informática</option>
            <option>Linguagens de Programação</option>
            <option>Programação de Computadores</option>
        </select>

        <br><br>

        <table border="1" cellpadding="5">
            <tr>
                <th>Nome do aluno</th>
                <th>Prova 1</th>
                <th>Prova 2</th>
                <th>Exame</th>
                <th>Média</th>
                <th>Faltas</th>
            </tr>

            <tr>
                <td>Joana da Silva</td>
                <td><input type="number" min="0" max="10" step="0.1" required></td>
                <td><input type="number" min="0" max="10" step="0.1" required></td>
                <td><input type="number" min="0" max="10" step="0.1"></td>
                <td><input type="number" readonly></td>
                <td><input type="number" min="0" max="16" required></td>
            </tr>

            <tr>
                <td>Maria do Socorro</td>
                <td><input type="number" min="0" max="10" step="0.1" required></td>
                <td><input type="number" min="0" max="10" step="0.1" required></td>
                <td><input type="number" min="0" max="10" step="0.1"></td>
                <td><input type="number" readonly></td>
                <td><input type="number" min="0" max="16" required></td>
            </tr>

            <tr>
                <td>Pedro Santos</td>
                <td><input type="number" min="0" max="10" step="0.1" required></td>
                <td><input type="number" min="0" max="10" step="0.1" required></td>
                <td><input type="number" min="0" max="10" step="0.1"></td>
                <td><input type="number" readonly></td>
                <td><input type="number" min="0" max="16" required></td>
            </tr>
        </table>

        <br>

        <button type="submit">Salvar</button>
        <button type="reset">Limpar</button>

    </form>

</body>
</html>
